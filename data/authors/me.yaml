experience:
  - role: "Hardware Engineer"
    org: "Dalian University of Technology"
    start: "Oct 2023"
    end: "Apr 2025"
    summary: "Spearheaded end-to-end hardware, mechanical, and algorithmic design for two National-Level Undergraduate Innovation robotics projects. Key achievements include leading the development of an FPGA-based Amphibious Transformable UAV—featuring a novel servo-driven wing-folding mechanism (achieving a 30% weight reduction) and a custom Verilog 3-loop cascade PID controller—which secured a National First Prize and the prestigious Best Creativity Award. Additionally, I designed the complete hardware and core attitude-determination algorithms for a highly agile self-balancing unicycle, implementing cascade PID for dual-orthogonal momentum wheels and an encoder-gyro sensor fusion algorithm for robust autonomous navigation."
  - role: "Deep Learning Researcher"
    org: "Peking University"
    start: "Apr 2025"
    end: "Sep 2025"
    summary: "Directed the end-to-end research and development of a Physics-Informed Deep Learning (LSTM) model for short-term wind speed forecasting. Managed the entire project lifecycle, from literature review and model design to Python-based training and paper drafting.


      Algorithm Innovation: Embedded momentum and divergence residuals of the 2D incompressible Navier-Stokes equations into the loss function, acting as a physical regularization to ensure the physical consistency of predictions.


      Data Engineering: Designed a multi-scale data preprocessing pipeline utilizing Instance Normalization, STL decomposition, and sliding window techniques.


      Key Achievements: The model outperformed traditional data-driven methods on the ERA5 dataset, achieving a MAPE of 5.67% and RMSE of 0.7045.


      Publication: Research culminated in a paper, \"Physics-informed Deep Learning for Short-term Wind Forecasting,\" accepted at ECE Forum 2025."
  - role: "Electrical Engineering Researcher"
    org: "Tsinghua University"
    start: "Sep 2025"
    end: ""
    summary: "Spearheading research on the supply adequacy and cross-regional collaborative planning of new power systems, focusing on extreme scenarios like low wind and low light conditions. Leveraged Python and MATLAB to process and visualize large-scale power generation data, specifically analyzing the interaction between the East China Power Grid and the nine major renewable energy bases in the Shagehuang region. The research aims to optimize power transmission and ensure grid stability. Currently drafting a comprehensive graduation thesis and academic papers using LaTeX to present strategies for efficient renewable energy integration."
